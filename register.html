<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAMAN Бінокль — Реєстрація</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0806;
    color: #f0e6d3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    border-bottom: 0.5px solid rgba(201,169,110,0.15);
    background: rgba(10,8,6,0.9);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .nav-logo img {
    height: 20px;
    filter: brightness(0) invert(1) sepia(0.3) saturate(1.5) hue-rotate(5deg);
    opacity: 0.85;
  }

  .nav-logo span {
    font-size: 13px;
    font-weight: 500;
    color: #f0e6d3;
    letter-spacing: 0.04em;
  }

  .nav-back {
    font-size: 11.5px;
    color: #9a8870;
    text-decoration: none;
    padding: 5px 12px;
    border-radius: 6px;
    border: 0.5px solid rgba(154,136,112,0.25);
    transition: all 0.2s;
  }

  .nav-back:hover { color: #c9a96e; border-color: rgba(201,169,110,0.4); }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(201,169,110,0.2);
    border-radius: 16px;
    padding: 2.5rem;
  }

  .card-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: #f0e6d3;
    margin-bottom: 0.4rem;
  }

  .card-sub {
    font-size: 13px;
    color: #9a8870;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 1.75rem;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 3px;
  }

  .tab {
    flex: 1;
    text-align: center;
    font-size: 12px;
    padding: 7px;
    border-radius: 6px;
    cursor: pointer;
    color: #9a8870;
    transition: all 0.2s;
    border: none;
    background: transparent;
  }

  .tab.active {
    background: rgba(201,169,110,0.15);
    color: #c9a96e;
    font-weight: 500;
  }

  /* GOOGLE BTN */
  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 11px;
    border-radius: 8px;
    border: 0.5px solid rgba(201,169,110,0.3);
    background: transparent;
    color: #f0e6d3;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.5rem;
  }

  .btn-google:hover {
    background: rgba(201,169,110,0.08);
    border-color: rgba(201,169,110,0.5);
  }

  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: rgba(201,169,110,0.15);
  }

  .divider span { font-size: 11px; color: #5a4a35; }

  /* FORM */
  .form-group { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 11px;
    color: #9a8870;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(201,169,110,0.2);
    border-radius: 8px;
    color: #f0e6d3;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }

  input::placeholder { color: #3a2a1a; }

  input:focus, select:focus {
    border-color: rgba(201,169,110,0.5);
    background: rgba(201,169,110,0.05);
  }

  select option { background: #1a1209; color: #f0e6d3; }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: #c9a96e;
    border: none;
    border-radius: 8px;
    color: #1a1209;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.5rem;
  }

  .btn-primary:hover { background: #d4b87a; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    font-size: 12px;
    color: #e07070;
    margin-top: 0.75rem;
    text-align: center;
    display: none;
  }

  .success {
    text-align: center;
    padding: 1rem 0;
  }

  .success-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }

  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: #f0e6d3;
    margin-bottom: 0.5rem;
  }

  .success-sub {
    font-size: 13px;
    color: #9a8870;
    line-height: 1.6;
  }

  .toggle-link {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 12px;
    color: #5a4a35;
  }

  .toggle-link a {
    color: #c9a96e;
    text-decoration: none;
    cursor: pointer;
  }

  footer {
    padding: 1.25rem 2.5rem;
    border-top: 0.5px solid rgba(201,169,110,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .footer-copy { font-size: 11px; color: rgba(154,136,112,0.4); }

  .footer-links { display: flex; gap: 1.5rem; }

  .footer-links a {
    font-size: 11px;
    color: rgba(154,136,112,0.3);
    text-decoration: none;
  }

  @media (max-width: 480px) {
    nav { padding: 0 1.25rem; }
    .card { padding: 1.75rem 1.25rem; }
    footer { padding: 1rem 1.25rem; flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="DRAMANlogo.png" alt="DRAMAN">
    <span>DRAMAN</span>
  </a>
  <a href="index.html" class="nav-back">← Назад</a>
</nav>

<main>
  <div class="card">

    <div id="view-auth">
      <h1 class="card-title">Бінокль</h1>
      <p class="card-sub">Увійдіть або зареєструйтесь щоб залишити відгук</p>

      <button class="btn-google" onclick="signInGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Увійти через Google
      </button>

      <div class="divider"><span>або</span></div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Увійти</button>
        <button class="tab" onclick="switchTab('register')">Реєстрація</button>
      </div>

      <div id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn-primary" onclick="signInEmail()">Увійти</button>
        <div class="error" id="login-error"></div>
        <div class="toggle-link">Забули пароль? <a onclick="resetPassword()">Відновити</a></div>
      </div>

      <div id="form-register" style="display:none;">
        <div class="form-group">
          <label>Ім'я</label>
          <input type="text" id="reg-name" placeholder="Як вас звати">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="reg-password" placeholder="Мінімум 6 символів">
        </div>
        <div class="form-group">
          <label>Місто</label>
          <input type="text" id="reg-city" placeholder="Київ">
        </div>
        <div class="form-group">
          <label>Категорія</label>
          <select id="reg-category">
            <option value="">Оберіть...</option>
            <option value="club">Учасник клубу DRAMAN</option>
            <option value="independent">Незалежний глядач</option>
          </select>
        </div>
        <button class="btn-primary" onclick="registerEmail()">Зареєструватись</button>
        <div class="error" id="reg-error"></div>
      </div>
    </div>

    <div id="view-success" style="display:none;">
      <div class="success">
        <div class="success-icon">🎭</div>
        <div class="success-title">Ласкаво просимо!</div>
        <p class="success-sub">Ви успішно увійшли. Тепер можете залишати відгуки про вистави.</p>
        <br>
        <button class="btn-primary" onclick="window.location.href='vidguk.html'">Написати відгук</button>
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="footer-copy">© 2026 DRAMAN Foundation. Всі права захищені.</div>
  <div class="footer-links">
    <a href="/privacy">Політика конфіденційності</a>
    <a href="https://draman.space" target="_blank">draman.space</a>
  </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGvIRd01jSFD1bvVBgyghnbQkYsmSsB10",
    authDomain: "draman-binokl.firebaseapp.com",
    projectId: "draman-binokl",
    storageBucket: "draman-binokl.firebasestorage.app",
    messagingSenderId: "959970091304",
    appId: "1:959970091304:web:29fd7ae3adf7fea966f01d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  function showSuccess() {
    document.getElementById('view-auth').style.display = 'none';
    document.getElementById('view-success').style.display = 'block';
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  }

  window.signInGoogle = function() {
    signInWithPopup(auth, provider)
      .then(() => showSuccess())
      .catch(e => showError('login-error', 'Помилка входу через Google'));
  }

  window.signInEmail = function() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    signInWithEmailAndPassword(auth, email, password)
      .then(() => showSuccess())
      .catch(e => showError('login-error', 'Невірний email або пароль'));
  }

  window.registerEmail = function() {
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    if (!name || !email || !password) {
      showError('reg-error', 'Заповніть всі обов\'язкові поля');
      return;
    }
    createUserWithEmailAndPassword(auth, email, password)
      .then(cred => updateProfile(cred.user, { displayName: name }))
      .then(() => showSuccess())
      .catch(e => {
        if (e.code === 'auth/email-already-in-use') showError('reg-error', 'Цей email вже зареєстрований');
        else if (e.code === 'auth/weak-password') showError('reg-error', 'Пароль занадто короткий');
        else showError('reg-error', 'Помилка реєстрації');
      });
  }

  window.resetPassword = function() {
    const email = document.getElementById('login-email').value;
    if (!email) { showError('login-error', 'Введіть email для відновлення'); return; }
    sendPasswordResetEmail(auth, email)
      .then(() => showError('login-error', 'Лист надіслано на ' + email))
      .catch(() => showError('login-error', 'Помилка. Перевірте email.'));
  }
</script>

</body>
</html>
